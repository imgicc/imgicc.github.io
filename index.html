<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImGicc WebOS</title>
    <meta name="description" content="A premium, glassmorphism styled data table for ImgICC operations.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.82);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent: #0284c7;
            --accent-glow: rgba(2, 132, 199, 0.15);
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #f0f9ff, #f8fafc);
            font-family: 'Outfit', sans-serif;
            color: var(--text-primary);
            overflow: hidden;
        }

        h1 {
            margin-bottom: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            font-size: 2.25rem;
            color: var(--text-primary);
            position: relative;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: var(--accent);
            border-radius: 2px;
        }

        .table-container {
            width: 50vw;
            height: 50vh;
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow:
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 20px 25px -5px rgba(0, 0, 0, 0.05),
                inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            display: flex;
            overflow: hidden;
            z-index: 1;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            /* Ensures even width distribution */
        }

        td {
            border: 1px solid var(--glass-border);
            text-align: center;
            padding: 1rem;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 2rem;
            /* Doubled from default (usually 1rem) */
            width: 33.33%;
            /* Explicit equal width */
            height: 33.33%;
            /* Explicit equal height */
        }

        td:hover {
            background: rgba(2, 132, 199, 0.03);
            color: var(--accent);
            font-weight: 600;
            cursor: pointer;
        }

        td a {
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }

        /* Ambient background accents */
        .ambient-blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--accent);
            filter: blur(120px);
            opacity: 0.1;
            z-index: 0;
            pointer-events: none;
            border-radius: 50%;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: #818cf8;
        }
    </style>
</head>

<body>
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

    <h1>ImGicc WebOS Apps</h1>

    <div class="table-container">
        <table>
            <tr>
                <td><a href="https://neunet-84aa20.gitlab.io" target="_blank">🧠Neunet Design</a></td>
                <td><a href="https://imgicc.github.io/apps/chatroom" target="_blank">💬 Chatroom</a></td>
                <td>R1 C3</td>
            </tr>
            <tr>
                <td>R2 C1</td>
                <td>R2 C2</td>
                <td>R2 C3</td>
            </tr>
            <tr>
                <td>R3 C1</td>
                <td>R3 C2</td>
                <td>R3 C3</td>
            </tr>
        </table>
    </div>
</body>

</html>
